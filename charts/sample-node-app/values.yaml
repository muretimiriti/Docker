nameOverride: sample-node-app
namespaceOverride: ""

image:
  repository: host.docker.internal:5000/sample-node-app
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  readinessPath: /healthz
  livenessPath: /healthz

replicaCount: 1

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75

pdb:
  enabled: true
  minAvailable: 1
