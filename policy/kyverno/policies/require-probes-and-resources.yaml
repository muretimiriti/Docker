apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-probes-and-resources-for-sample-node-app
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-probes-and-resources
      match:
        any:
          - resources:
              kinds:
                - Deployment
              names:
                - sample-node-app*
      validate:
        message: sample-node-app requires readiness/liveness probes and CPU/memory requests/limits.
        pattern:
          spec:
            template:
              spec:
                containers:
                  - name: "*"
                    readinessProbe:
                      httpGet:
                        path: "?*"
                        port: "?*"
                    livenessProbe:
                      httpGet:
                        path: "?*"
                        port: "?*"
                    resources:
                      requests:
                        cpu: "?*"
                        memory: "?*"
                      limits:
                        cpu: "?*"
                        memory: "?*"
