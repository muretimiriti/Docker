apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: prod
resources:
  - namespace.yaml
  - ../../base
images:
  - name: host.docker.internal:5000/sample-node-app
    newName: host.docker.internal:5000/sample-node-app
    newTag: latest
patches:
  - target:
      kind: Deployment
      name: sample-node-app
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
