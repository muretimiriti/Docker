apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: https://vault.vault.svc.cluster.local:8200
      path: kv
      version: v2
      auth:
        appRole:
          path: approle
          roleId: "REPLACE_WITH_VAULT_ROLE_ID"
          secretRef:
            name: vault-approle
            key: secret-id
            namespace: external-secrets
