apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: npm-test
spec:
  description: |
    Install deps and run tests for the Node app. Uses a persistent cache workspace for npm cache.
  params:
    - name: WORKDIR
      type: string
      default: .
      description: "Subdirectory containing package.json"
    - name: UNIT_TEST_COMMAND
      type: string
      default: "find tests -type f -name '*.test.js' ! -name '*.integration.test.js' -print0 | xargs -0 node --test"
      description: "Command used for unit tests only"
  workspaces:
    - name: source
      description: Cloned source
    - name: cache
      description: Cache workspace (recommended)
      optional: true
  steps:
    - name: install-test
      image: node:24
      env:
        - name: NPM_CONFIG_CACHE
          value: /workspace/cache/npm
      workingDir: /workspace/source/$(params.WORKDIR)
      script: |
        #!/usr/bin/env sh
        set -eu
        node -v
        npm -v
        npm ci --prefer-offline --no-audit
        sh -c "$(params.UNIT_TEST_COMMAND)"
