
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: generate-image-tag
spec:
  description: Generate date-stamped image tag from Git SHA
  
  params:
    - name: IMAGE_NAME
      type: string
      description: Base image name (e.g., muretimiriti/test1)
  
  workspaces:
    - name: source
      description: Git repository workspace
  
  results:
    - name: IMAGE_TAG
      description: Generated date-stamped tag (e.g., 20260225-071530-abc1234)
    - name: FULL_IMAGE
      description: Full image reference with tag

  steps:
    - name: generate
      image: alpine/git:latest
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        set -e
        
        echo "=========================================="
        echo "🏷️  Generating image tag"
        echo "=========================================="
        
        # Generate date-stamped tag: YYYYMMDD-HHMMSS-gitsha
        DATE_TAG=$(date -u +"%Y%m%d-%H%M%S")
        GIT_SHA=$(git rev-parse --short=7 HEAD 2>/dev/null || echo "unknown")
        
        IMAGE_TAG="${DATE_TAG}-${GIT_SHA}"
        IMAGE_NAME="$(params.IMAGE_NAME)"
        FULL_IMAGE="${IMAGE_NAME}:${IMAGE_TAG}"
        
        echo "Base image: $IMAGE_NAME"
        echo "Generated tag: $IMAGE_TAG"
        echo "Full image: $FULL_IMAGE"
        
        # Save results
        echo -n "$IMAGE_TAG" | tee $(results.IMAGE_TAG.path)
        echo -n "$FULL_IMAGE" | tee $(results.FULL_IMAGE.path)
        
        echo "=========================================="
        echo "✅ Tag generation complete"
        echo "=========================================="
