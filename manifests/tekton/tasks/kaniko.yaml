
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: kaniko
spec:
  description: Build and push Docker image
  
  params:
    - name: IMAGE
      type: string
    - name: IMAGE_TAG
      type: string
    - name: CONTEXT
      default: "."
    - name: DOCKERFILE
      default: "Dockerfile"

  workspaces:
    - name: source
    - name: dockerconfig

  results:
    - name: IMAGE_DIGEST
    - name: IMAGE_URL

  steps:
    - name: build-and-push
      image: gcr.io/kaniko-project/executor:v1.23.2
      workingDir: /workspace
      env:
        - name: DOCKER_CONFIG
          value: /kaniko/.docker
      command:
        - /kaniko/executor
      args:
        - --dockerfile=$(workspaces.source.path)/$(params.DOCKERFILE)
        - --context=dir://$(workspaces.source.path)/$(params.CONTEXT)
        - --destination=$(params.IMAGE):$(params.IMAGE_TAG)
        - --destination=$(params.IMAGE):latest
        - --digest-file=$(results.IMAGE_DIGEST.path)
        - --snapshotMode=redo
        - --verbosity=info
        - --skip-tls-verify
      volumeMounts:
        - name: dockerconfig
          mountPath: /kaniko/.docker
      
  sidecars:
    - name: setup-docker-config
      image: alpine:latest
      command: ["/bin/sh"]
      args:
        - -c
        - |
          cp $(workspaces.dockerconfig.path)/config.json /kaniko/.docker/config.json
          sleep infinity
      volumeMounts:
        - name: dockerconfig
          mountPath: /kaniko/.docker
  
  volumes:
    - name: dockerconfig
      emptyDir: {}
