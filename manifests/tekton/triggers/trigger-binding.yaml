apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: github-push-binding
spec:
  params:
    - name: repo-url
      value: $(body.repository.clone_url)
    
    - name: run-sonarqube
      value: "false"
    
    # DO NOT include image-reference here
    # TriggerTemplate handles it with hardcoded value
