
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: github-push-binding
spec:
  params:
    - name: repo-url
      value: $(body.repository.clone_url)
    # Extract just the repo name, not the full image with tag
    - name: image-reference
      value: muretimiriti/test1  # ← Just base name, no tag!
    - name: run-sonarqube
      value: "false"
