apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: tekton-trigger-listeners
spec:
  description: |
    This pipeline clones a git repo, runs tests, scans, and builds a Docker image.
    Cache is managed sequentially to avoid PVC binding conflicts.

  params:
    - name: repo-url
      type: string
      description: The git repo URL to clone from

    - name: image-reference
      type: string
      description: The image reference to build and push

    - name: run-sonarqube
      type: string
      default: "false"
      description: "Set to true to run SonarQube scan"
    - name: notification-webhook-url
      type: string
      default: ""
      description: "Optional webhook URL for pipeline success/failure notifications"
    - name: integration-tests-strict
      type: string
      default: "false"
      description: "If true, fail when integration tests are missing"
    - name: run-integration-tests
      type: string
      default: "false"
      description: "Set to true to run integration tests"
    - name: argocd-auto-deploy
      type: string
      default: "true"
      description: "Set to true to update and sync ArgoCD app immediately after build"
    - name: argocd-namespace
      type: string
      default: "argocd"
      description: "Namespace containing the ArgoCD Application"
    - name: argocd-app-name
      type: string
      default: "tech-stack"
      description: "ArgoCD Application name to patch with latest image"

  workspaces:
    - name: shared-data
      description: Workspace for cloned source code
    - name: docker-credentials
      description: Workspace for docker credentials
    - name: cache
      description: Persistent cache workspace (npm, trivy, sonar)

  tasks:
    # ─────────────────────────────────────────
    # STAGE 1: Clone source code
    # Workspaces: shared-data only
    # ─────────────────────────────────────────
    - name: fetch-source
      retries: 2
      taskRef:
        name: git-clone
      params:
        - name: url
          value: $(params.repo-url)
      workspaces:
        - name: output
          workspace: shared-data        # ← shared-data ONLY

    # ─────────────────────────────────────────
    # STAGE 2: Restore cache to shared-data
    # Workspaces: shared-data + cache
    # Cache is mounted HERE first
    # ─────────────────────────────────────────
    - name: restore-cache
      runAfter:
        - fetch-source
      taskSpec:
        workspaces:
          - name: source
          - name: cache
        steps:
          - name: restore
            image: alpine
            script: |
              #!/bin/sh
              set -e

              echo "=========================================="
              echo "🔄 Restoring cache..."
              echo "=========================================="

              # Restore node_modules
              if [ -d "$(workspaces.cache.path)/node_modules" ]; then
                echo "✅ Cache hit! Restoring node_modules..."
                cp -r $(workspaces.cache.path)/node_modules \
                      $(workspaces.source.path)/node_modules
              else
                echo "⚠️  Cache miss - node_modules not cached"
              fi

              # Restore npm cache
              if [ -d "$(workspaces.cache.path)/.npm" ]; then
                echo "✅ Cache hit! Restoring .npm cache..."
                cp -r $(workspaces.cache.path)/.npm \
                      $(workspaces.source.path)/.npm
              else
                echo "⚠️  Cache miss - .npm not cached"
              fi

              # Restore trivy cache
              if [ -d "$(workspaces.cache.path)/.trivy" ]; then
                echo "✅ Cache hit! Restoring trivy cache..."
                cp -r $(workspaces.cache.path)/.trivy \
                      $(workspaces.source.path)/.trivy
              else
                echo "⚠️  Cache miss - trivy cache not found"
              fi

              # Restore sonar cache
              if [ -d "$(workspaces.cache.path)/.sonar" ]; then
                echo "✅ Cache hit! Restoring sonar cache..."
                cp -r $(workspaces.cache.path)/.sonar \
                      $(workspaces.source.path)/.sonar
              else
                echo "⚠️  Cache miss - sonar cache not found"
              fi

              echo "=========================================="
              echo "✅ Cache restore complete"
              echo "=========================================="
      workspaces:
        - name: source
          workspace: shared-data
        - name: cache
          workspace: cache              # ← cache mounted here ONLY

    # ─────────────────────────────────────────
    # STAGE 3: Run npm tests
    # Workspaces: shared-data ONLY
    # cache PVC is RELEASED after restore-cache
    # ─────────────────────────────────────────
    - name: npm-test
      retries: 1
      runAfter:
        - restore-cache
      taskRef:
        name: npm-test
      workspaces:
        - name: source
          workspace: shared-data        # ← shared-data ONLY

    - name: integration-test
      retries: 1
      runAfter:
        - npm-test
      when:
        - input: "$(params.run-integration-tests)"
          operator: in
          values: ["true"]
      taskRef:
        name: npm-integration-test
      params:
        - name: STRICT
          value: "$(params.integration-tests-strict)"
      workspaces:
        - name: source
          workspace: shared-data

    # ─────────────────────────────────────────
    # STAGE 4: Show README
    # Workspaces: shared-data ONLY
    # ─────────────────────────────────────────
    - name: show-readme
      runAfter:
        - npm-test
      taskRef:
        name: show-readme
      workspaces:
        - name: source
          workspace: shared-data        # ← shared-data ONLY

    # ─────────────────────────────────────────
    # STAGE 5: Debug workspace
    # Workspaces: shared-data ONLY
    # ─────────────────────────────────────────
    - name: debug-workspace
      runAfter:
        - show-readme
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: list-workspace
            image: alpine
            script: |
              echo "Workspace contents:"
              ls -R /workspace
      workspaces:
        - name: source
          workspace: shared-data        # ← shared-data ONLY

    # ─────────────────────────────────────────
    # STAGE 6: SCA Scan
    # Workspaces: shared-data ONLY
    # Uses trivy cache copied to shared-data
    # ─────────────────────────────────────────
    - name: sca-scan
      retries: 1
      runAfter:
        - debug-workspace
      taskRef:
        name: trivy-sca-scan
      params:
        - name: SEVERITY
          value: "HIGH,CRITICAL"
        - name: SCAN_MODE
          value: fs
        - name: TARGET
          value: .
      workspaces:
        - name: source
          workspace: shared-data        # ← shared-data ONLY

    # ─────────────────────────────────────────
    # STAGE 7: SonarQube scan (conditional)
    # Workspaces: shared-data ONLY
    # Uses sonar cache copied to shared-data
    # ─────────────────────────────────────────
    - name: sonarqube-scan
      runAfter:
        - show-readme
      when:
        - input: "$(params.run-sonarqube)"
          operator: in
          values: ["true"]
      taskRef:
        name: sonarqube-scan
      params:
        - name: WORKDIR
          value: .
      workspaces:
        - name: source
          workspace: shared-data        # ← shared-data ONLY

    # ─────────────────────────────────────────
    # STAGE 8: Save cache back
    # Workspaces: shared-data + cache
    # Cache is mounted HERE again AFTER all tasks
    # that needed it are done
    # ─────────────────────────────────────────
    - name: save-cache
      runAfter:
        - sca-scan
        - sonarqube-scan
      taskSpec:
        workspaces:
          - name: source
          - name: cache
        steps:
          - name: save
            image: alpine
            script: |
              #!/bin/sh
              set -e

              echo "=========================================="
              echo "💾 Saving cache..."
              echo "=========================================="

              # Save node_modules
              if [ -d "$(workspaces.source.path)/node_modules" ]; then
                echo "Saving node_modules..."
                rm -rf $(workspaces.cache.path)/node_modules
                cp -r $(workspaces.source.path)/node_modules \
                      $(workspaces.cache.path)/node_modules
                echo "✅ node_modules saved"
              fi

              # Save npm cache
              if [ -d "$(workspaces.source.path)/.npm" ]; then
                echo "Saving .npm cache..."
                rm -rf $(workspaces.cache.path)/.npm
                cp -r $(workspaces.source.path)/.npm \
                      $(workspaces.cache.path)/.npm
                echo "✅ .npm cache saved"
              fi

              # Save trivy cache
              if [ -d "$(workspaces.source.path)/.trivy" ]; then
                echo "Saving trivy cache..."
                rm -rf $(workspaces.cache.path)/.trivy
                cp -r $(workspaces.source.path)/.trivy \
                      $(workspaces.cache.path)/.trivy
                echo "✅ trivy cache saved"
              fi

              # Save sonar cache
              if [ -d "$(workspaces.source.path)/.sonar" ]; then
                echo "Saving sonar cache..."
                rm -rf $(workspaces.cache.path)/.sonar
                cp -r $(workspaces.source.path)/.sonar \
                      $(workspaces.cache.path)/.sonar
                echo "✅ sonar cache saved"
              fi

              echo "=========================================="
              echo "Cache contents:"
              du -sh $(workspaces.cache.path)/* 2>/dev/null || echo "Cache empty"
              echo "✅ Cache save complete"
              echo "=========================================="
      workspaces:
        - name: source
          workspace: shared-data
        - name: cache
          workspace: cache              # ← cache mounted here ONLY

    # ─────────────────────────────────────────
    # STAGE 9: Tag Build and push image
    # Workspaces: shared-data + docker-credentials
    # ─────────────────────────────────────────

    - name: generate-tag
      runAfter:
        - save-cache
      taskRef:
        name: generate-image-tag
      params:
        - name: IMAGE_NAME
          value: $(params.image-reference)
      workspaces:
        - name: source
          workspace: shared-data        # ← shared-data ONLY
       
    - name: build-push
      retries: 1
      runAfter:
        - generate-tag
      taskRef:
        name: kaniko
      params:
        - name: IMAGE
          value: $(params.image-reference)
        - name: IMAGE_TAG
          value: $(tasks.generate-tag.results.IMAGE_TAG)
        - name: CONTEXT
          value: .
        - name: DOCKERFILE
          value: Dockerfile
      workspaces:
        - name: source
          workspace: shared-data        # ← shared-data ONLY
        - name: dockerconfig
          workspace: docker-credentials # ← Secret, not PVC

    - name: sync-argocd-image
      runAfter:
        - build-push
      when:
        - input: "$(params.argocd-auto-deploy)"
          operator: in
          values: ["true"]
      taskSpec:
        params:
          - name: argocd-namespace
            type: string
          - name: argocd-app-name
            type: string
          - name: image-base
            type: string
          - name: image-url
            type: string
        steps:
          - name: patch-app-image
            image: bitnami/kubectl:1.32.4
            script: |
              #!/usr/bin/env sh
              set -eu

              app_ns="$(params.argocd-namespace)"
              app_name="$(params.argocd-app-name)"
              image_base="$(params.image-base)"
              image_url="$(params.image-url)"

              echo "Patching Application ${app_name} in namespace ${app_ns} with image ${image_url}"
              kubectl -n "${app_ns}" patch application "${app_name}" --type merge \
                -p "{\"spec\":{\"source\":{\"kustomize\":{\"images\":[\"${image_base}=${image_url}\"]}}}}"

              kubectl -n "${app_ns}" annotate application "${app_name}" argocd.argoproj.io/refresh=hard --overwrite
              kubectl -n "${app_ns}" patch application "${app_name}" --type merge \
                -p '{"operation":{"sync":{"prune":true,"syncOptions":["CreateNamespace=true"]}}}'
      params:
        - name: argocd-namespace
          value: "$(params.argocd-namespace)"
        - name: argocd-app-name
          value: "$(params.argocd-app-name)"
        - name: image-base
          value: "$(params.image-reference)"
        - name: image-url
          value: "$(tasks.build-push.results.IMAGE_URL)"

  finally:
    - name: notify-summary
      taskSpec:
        params:
          - name: webhook-url
            type: string
          - name: repo-url
            type: string
        steps:
          - name: print-summary
            image: alpine:3.20
            script: |
              #!/bin/sh
              set -eu
              echo "pipeline_status=$(tasks.status)"
              echo "repo_url=$(params.repo-url)"
          - name: webhook
            image: curlimages/curl:8.10.1
            script: |
              #!/bin/sh
              set -eu
              if [ -z "$(params.webhook-url)" ]; then
                echo "notification webhook not configured; skipping"
                exit 0
              fi
              payload=$(cat <<JSON
              {"pipeline":"tekton-trigger-listeners","status":"$(tasks.status)","repo":"$(params.repo-url)","namespace":"$(context.pipelineRun.namespace)","pipelinerun":"$(context.pipelineRun.name)"}
              JSON
              )
              curl -fsS -X POST "$(params.webhook-url)" -H 'Content-Type: application/json' -d "$payload"
      params:
        - name: webhook-url
          value: $(params.notification-webhook-url)
        - name: repo-url
          value: $(params.repo-url)



    
